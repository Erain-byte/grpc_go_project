syntax = "proto3";

package admin;

option go_package = "github.com/Erain-byte/grpc_go_project/proto/admin;admin";

service AdminService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetAdminInfo(GetAdminInfoRequest) returns (GetAdminInfoResponse);
  rpc CreateAdmin(CreateAdminRequest) returns (CreateAdminResponse);
  rpc GetAdminList(GetAdminListRequest) returns (GetAdminListResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
}

message LogoutRequest { string token = 1; }

message LogoutResponse {
  bool success = 1;
  string message = 2;
}

message GetAdminInfoRequest { string token = 1; }

message GetAdminInfoResponse {
  bool success = 1;
  string message = 2;
  Admin admin_info = 3;
}

message CreateAdminRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  AdminRole role = 4;
}

message CreateAdminResponse {
  bool success = 1;
  string message = 2;
  Admin admin = 3;
}

message GetAdminListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message GetAdminListResponse {
  repeated Admin admins = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message Admin {
  string id = 1;
  string username = 2;
  string email = 3;
  AdminRole role = 4;
}

enum AdminRole {
  ADMIN_ROLE_UNSPECIFIED = 0;
  ADMIN_ROLE_SUPER_ADMIN = 1;
  ADMIN_ROLE_ADMIN = 2;
}
